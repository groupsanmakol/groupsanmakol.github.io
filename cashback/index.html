<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tra cứu đơn hàng hoàn tiền</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
<header class="topbar">

    <div class="logo">
        <a href="/">SANMAKOL</a>
    </div>

    <nav>

        <a href="/">Trang chủ</a>
        <a href="/shopee/">Lấy mã Shopee</a>
        <a href="/custom/">Tạo Link</a>
        <a class="active" href="/cashback/">Tra đơn</a>
        <a href="/pay/">Rút tiền</a>
        <a href="/guide/">Hướng dẫn</a>
        </a>
    </nav>

</header>

<main>
<section class="page-header">

    <h1>💰 Tra cứu Cashback</h1>

    <p>Tra cứu bằng ID đơn hàng hoặc số điện thoại.</p>

</section>

<section class="tool-card">

    <div class="form-group">

        <label>

            <i class="fa-solid fa-magnifying-glass"></i>

            ID đơn hàng hoặc SĐT

        </label>

        <input
            id="cashbackKeyword"
            type="text"
            placeholder="260704RV9xxxxx hoặc 09xxxxxxxx"
        >

    </div>

    <button
        id="searchCashbackBtn"
        class="btn-primary">

        TRA CỨU

    </button>

</section>


 <section
id="cashbackResult"
class="result-card"
style="display:none;">

<div class="result-header">

    <h2>Kết quả</h2>

    <div
        id="cashbackUpdate"
        class="update-badge">

        📅 --

    </div>

</div>

    <div
        class="status"
        id="cashbackStatus">

    </div>

    <div
        class="cashback-summary">

        <div class="summary-title">

            Tổng tiền hoàn dự kiến

        </div>

        <div
            id="cashbackTotal"
            class="summary-money">

            0đ

        </div>

    </div>

    <div id="cashbackList"></div>

</section>

    </main>

<footer>

© 2026 SANMAKOL

</footer>

<div
    id="toast"
    class="toast"
>

Đã sao chép

</div>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/cashback.js"></script>
</body>
</html>
